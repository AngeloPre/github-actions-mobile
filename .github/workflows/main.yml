name: CI e Deploy Web

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test -- --runInBand

  deploy-web:
    name: Deploy Web (GitHub Pages)
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Instalar dependências
        run: npm ci

      - name: Criar arquivo .env do Expo
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Exportar build web do Expo
        run: npm run export:web

      - name: Desabilitar Jekyll
        run: touch dist/.nojekyll

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
