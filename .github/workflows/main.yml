name: CI e Deploy Web

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test -- --runInBand

  deploy-web:
    name: Deploy Web (GitHub Pages)
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Instalar dependências
        run: npm ci

      - name: Criar arquivo .env do Expo
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Exportar build web do Expo
        run: npm run export:web

      - name: Desabilitar Jekyll
        run: touch dist/.nojekyll

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        
  build-apk:
    name: Build do APK Android
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm ci

      - name: Criar arquivo .env do Expo
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Gerar código nativo (prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Permissão de execução no gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK de release
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload do APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  release:
    name: Publicar GitHub Release
    needs: [deploy-web, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar APK do artefato
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: ./apk

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.run_number }}" \
            ./apk/app-release.apk \
            --title "Release v${{ github.run_number }}" \
            --notes "Build automático gerado pelo workflow run #${{ github.run_number }} (commit ${{ github.sha }})." \
            --repo "${{ github.repository }}"